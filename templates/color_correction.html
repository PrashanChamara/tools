<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Image Color Correction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    body {
      display: flex;
      flex-direction: column;
      background-color: #f8f9fa;
    }
    header {
      display: flex;
      align-items: center;
      padding: 10px 15px;
      background-color: #fff;
      border-bottom: 1px solid #ddd;
    }
    header a {
      text-decoration: none;
    }
    header img {
      height: 50px;
    }
    .container {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 20px auto;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
      background-color: #fff;
      text-align: center;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .box h2 {
      margin-bottom: 15px;
    }
    #original-image, #processed-image {
      max-width: 100%;
      height: auto;
      display: none;
      margin-bottom: 15px;
    }
    footer {
      background-color: #2f2f2f;
      color: #fff;
      text-align: center;
      padding: 20px 0;
    }
    .btn-row, .options-row {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ url_for('home') }}">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" />
    </a>
  </header>

  <div class="container">
    <h1 class="text-center my-3">Automatic Color Correction</h1>
    <div class="row">
      <div class="col-md-6 mb-3">
        <div class="box">
          <h2>Original Image</h2>
          <img id="original-image" alt="Original" />
          <input type="file" id="image-input" accept="image/*" class="form-control-file" />
        </div>
      </div>

      <div class="col-md-6 mb-3">
        <div class="box">
          <h2>Corrected Image</h2>
          <img id="processed-image" alt="Processed" />
          <div class="options-row">
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="correction-mode" id="mode-day" value="day" checked>
              <label class="form-check-label" for="mode-day">Day Time</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="correction-mode" id="mode-night" value="night">
              <label class="form-check-label" for="mode-night">Night Time</label>
            </div>
          </div>
          <div class="btn-row">
            <button id="correct-btn" class="btn btn-primary">Correct Colors</button>
            <button id="download-btn" class="btn btn-success" style="display: none;">Download</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    tux-talk @ 2025
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const fileInput = document.getElementById('image-input');
    const originalImg = document.getElementById('original-image');
    const processedImg = document.getElementById('processed-image');
    const correctBtn = document.getElementById('correct-btn');
    const downloadBtn = document.getElementById('download-btn');

    let uploadedFile = null;

    fileInput.addEventListener('change', function() {
      if (!fileInput.files.length) return;
      uploadedFile = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        originalImg.src = e.target.result;
        originalImg.style.display = 'block';
      };
      reader.readAsDataURL(uploadedFile);

      processedImg.src = '';
      processedImg.style.display = 'none';
      downloadBtn.style.display = 'none';
    });

    correctBtn.addEventListener('click', function() {
      if (!uploadedFile) {
        alert("Please select an image first.");
        return;
      }

      const mode = document.querySelector('input[name="correction-mode"]:checked').value;
      const formData = new FormData();
      formData.append('image', uploadedFile);
      formData.append('mode', mode);

      // Add a loading indicator
      processedImg.src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"; // 1x1 transparent GIF
      processedImg.style.display = 'block';
      
      fetch('/process_color_correction', {
        method: 'POST',
        body: formData
      })
      .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.blob();
      })
      .then(blob => {
        const url = URL.createObjectURL(blob);
        processedImg.src = url;
        downloadBtn.style.display = 'inline-block';
        downloadBtn.onclick = function() {
          const a = document.createElement('a');
          a.href = url;
          a.download = "color_corrected.png";
          document.body.appendChild(a);
          a.click();
          a.remove();
        };
      })
      .catch(err => {
        alert("Error correcting image: " + err);
        processedImg.style.display = 'none';
        console.error(err);
      });
    });
  </script>
</body>
</html>
